name: Prompt Eval — phi3-financial

on:
  push:
    branches: [main]
    paths:
      - 'ollama_server/Modelfile'
      - 'scripts/eval.py'
  pull_request:
    branches: [main]
    paths:
      - 'ollama_server/Modelfile'
      - 'scripts/eval.py'
  # Weekly baseline run — catches silent model weight updates under the same tag
  # (e.g. Ollama ships a new phi3.5 quantization without a version bump).
  # Runs every Monday 06:00 UTC against the current Modelfile on main.
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  eval:
    name: Run phi3-financial eval suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements-eval.txt

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Trust minicloud CA
        env:
          MINICLOUD_CA_CERT: ${{ secrets.MINICLOUD_CA_CERT }}
        run: |
          echo "$MINICLOUD_CA_CERT" | base64 -d > /tmp/minicloud-ca.crt
          sudo cp /tmp/minicloud-ca.crt /usr/local/share/ca-certificates/minicloud-ca.crt
          sudo update-ca-certificates
          # Append to certifi so httpx (used by openai client) trusts it
          cat /tmp/minicloud-ca.crt >> $(python3 -c "import certifi; print(certifi.where())")

      - name: Run eval suite
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST:       ${{ secrets.LANGFUSE_HOST }}
          LITELLM_API_KEY:     ${{ secrets.LITELLM_API_KEY }}
          LITELLM_BASE_URL:    ${{ secrets.LITELLM_BASE_URL }}
          # EVAL_MODEL defaults to phi3-financial in eval.py — reaches local Ollama
          # via Tailscale → 10.0.0.200 → NGINX → LiteLLM → Ollama (fast-heron).
          # No EVAL_MODEL secret needed; remove from env if set to something else.
        run: python scripts/eval.py

      - name: Upload eval results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: eval-failure-${{ github.run_id }}
          path: |
            ollama_server/Modelfile
          retention-days: 14
